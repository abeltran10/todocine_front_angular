<div class="card" style="width: 27rem; height: 60rem;">
  <img
    class="card-img-top"
    [src]="img"
    alt="poster"
  />

  <div class="card-body d-flex flex-column">
    <h5 class="card-title">
      {{ movie.title }} {{ releaseDate }}
    </h5>

    <p class="card-text line-clamp">
      {{ movie.overview }}
    </p>

    <div class="mb-2 text-warning">
      @for (star of [1,2,3,4,5]; track star) {
        <i class="fa" [ngClass]="movie.voto >= star ? 'fa-star' : 'fa-star-o'"></i>
      }
    </div>

    <div class="d-flex align-items-center mb-3">
      <div class="text-secondary opacity-75">
        <i class="fa me-1" 
          [ngClass]="isVista ? 'fa-eye text-success' : 'fa-eye-slash text-danger'">
        </i>
        <span class="fw-bold">
          {{ isVista ? 'Vista' : 'Pendiente' }}
        </span>
      </div>
    </div>

    <div class="mt-auto d-flex justify-content-start">
      <button
        class="btn btn-primary detalleButton"
        (click)="handleLoadMovieDetail()">
        Detalle
      </button>
    </div>  
  </div>
</div>
