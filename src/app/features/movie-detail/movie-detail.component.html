
@if (movieDetail$ | async; as movie) {
  <app-movie
    [movieDetail]="movie"
    (addFavoritos)="addFavoritos($event)"
    (removeFavoritos)="removeFavoritos($event)"
    (addVote)="addVote($event.movie, $event.rating)"
    (updateVista)="updateVista($event.movie, $event.isVista)">
  </app-movie>
} @else {
  <div class="text-center mt-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2">Cargando detalle...</p>
  </div>
}
