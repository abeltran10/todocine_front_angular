<app-navigation-bar
  [user]="usuario"
  (error)="setErrorMessage($event)">
</app-navigation-bar>

<app-notification
  [successMessage]="(successMessage$ | async) ?? ''"
  [errorMessage]="(errorMessage$ | async) ?? ''">
</app-notification>

@if (movieDetail$ | async; as movie) {
  <app-movie
    [movieDetail]="movie"
    (addFavoritos)="addFavoritos($event)"
    (removeFavoritos)="removeFavoritos($event)"
    (addVote)="addVote($event.movie, $event.rating)"
    (updateVista)="updateVista($event.movie, $event.isVista)">
  </app-movie>
}
