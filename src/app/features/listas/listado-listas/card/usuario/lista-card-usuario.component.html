<div class="card h-100 shadow-sm">
      <div class="card-body d-flex flex-column">
        <h5 class="card-title text-primary">{{ lista.nombre }}</h5>
        <p class="card-text text-muted">{{ lista.descripcion }}</p>
        <div class="mt-auto d-flex gap-2">
          <button class="btn btn-primary btn-sm" (click)="goToDetail()">
           <i class="fa fa-eye"></i>
          </button>
          <button class="btn btn-warning btn-sm text-dark" 
                  (click)="editarLista()" 
                  data-bs-toggle="modal" 
                  data-bs-target="#modalLista">
             <i class="fa fa-pencil"></i>
          </button>
          <button class="btn btn-danger btn-sm" (click)="borrarLista()">
             <i class="fa fa-trash"></i>
          </button>
          
        </div>
      </div>
</div>
