<div class="card shadow-sm">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th style="width: 100px;">Póster</th>
                    <th>
                        Título
                        <button class="btn btn-link btn-sm text-white p-0 ms-2" (click)="ordenarPor('title')">
                            <i class="fa" [ngClass]="getIcono('title')"></i>
                        </button>
                    </th>
                    <th>
                        Fecha de Estreno
                        <button class="btn btn-link btn-sm text-white p-0 ms-2" (click)="ordenarPor('year')">
                            <i class="fa" [ngClass]="getIcono('year')"></i>
                        </button>
                    </th>
                    <th class="text-end">Acciones</th>
                </tr>
            </thead>
            <tbody>
                @for (movie of moviesList.results; track movie.id) {
                    <tr>
                        <td>
                            <img [src]="'https://image.tmdb.org/t/p/w92' + movie.poster_path" 
                                 [alt]="movie.title"
                                 class="img-thumbnail"
                                 style="width: 60px;">
                        </td>
                        <td><strong>{{ movie.title }}</strong></td>
                        <td>{{ movie.release_date | date:'dd/MM/yyyy' }}</td>
                        <td class="text-end">
                            <div class="d-flex justify-content-end gap-2">
                                <button class="btn btn-primary btn-sm" (click)="handleLoadMovieDetail(movie.id)">
                                    <i class="bi bi-info-circle"></i> Detalle
                                </button>
                                @if (lista.username === usuario?.username) {
                                    <button class="btn btn-danger btn-sm" (click)="eliminarPelicula(movie.id)">
                                        <i class="fa fa-trash"></i> 
                                    </button>
                                }
                            </div>  
                        </td>           
                    </tr>
                } @empty {
                    <tr>
                        <td colspan="4" class="text-center py-4 text-muted">
                            No hay películas en esta lista todavía.
                        </td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
</div>

@if (moviesList.total_pages > 0) {
    <div class="mt-3">
        <app-paginator
            [activePage]="moviesList.page"
            [totalPages]="moviesList.total_pages"
            (pageChange)="loadMoviesList(ordenar, $event)">
        </app-paginator>
    </div>
}
