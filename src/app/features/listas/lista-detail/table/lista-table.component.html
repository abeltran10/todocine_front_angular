<div class="card shadow-sm">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
        <thead class="table-dark">
            <tr>
            <th style="width: 100px;">Póster</th>
            <th>Título</th>
            <th>Fecha de Estreno</th>
            <th class="text-end">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let movie of moviesList.results">
            <td>
                <img [src]="'https://image.tmdb.org/t/p/w92' + movie.poster_path" 
                    [alt]="movie.title"
                    class="img-thumbnail"
                    style="width: 60px;">
            </td>
            <td>
                <strong>{{ movie.title }}</strong>
            </td>
            <td>{{ movie.release_date | date:'dd/MM/yyyy' }}</td>
            <td class="text-end">
                <div class="d-flex justify-content-end gap-2">
                <button class="btn btn-primary btn-sm" 
                        (click)="handleLoadMovieDetail(movie.id)">
                    <i class="bi bi-info-circle"></i> Detalle
                </button>
                <button *ngIf="lista.username === usuario?.username" 
                        class="btn btn-outline-danger btn-sm" 
                        (click)="eliminarPelicula(movie.id)">
                    <i class="bi bi-trash"></i> Eliminar
                </button>
                </div>  
            </td>           
            </tr>
            
            <tr *ngIf="moviesList.results?.length === 0">
            <td colspan="4" class="text-center py-4 text-muted">
                No hay películas en esta lista todavía.
            </td>
            </tr>
        </tbody>
        </table>
    </div>
</div>

<div class="mt-3">
    <app-paginator
        *ngIf="moviesList.total_pages > 0"
        [activePage]="moviesList.page"
        [totalPages]="moviesList.total_pages"
        (pageChange)="loadMoviesList($event)">
    </app-paginator>
</div>
