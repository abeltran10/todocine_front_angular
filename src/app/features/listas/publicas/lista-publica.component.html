<div class="container mt-3">
  @if (listas$ | async; as paginator) {
    <div class="container mt-4">
      <div class="row row-cols-1 row-cols-md-3 g-4">
        @for (lista of paginator.results; track lista.id) {
          <div class="col">
            <app-card-lista-publica [lista]="lista"></app-card-lista-publica>
          </div>
        } @empty {
          <div class="col-12 text-center text-muted">
            <p>No hay listas públicas disponibles en este momento.</p>
          </div>
        }
      </div>
    </div>
  
    <app-paginator
      [activePage]="paginator.page"
      [totalPages]="paginator.total_pages"
      (pageChange)="loadListas($event)">
    </app-paginator>
  }
</div>
