@if (award$ | async; as award) {
  <div class="container-md">
    <div class="row row-cols-1 row-cols-md-3 g-4">
      @for (anyo of award.anyos; track anyo) {
        <div class="col">
          <app-anyos
            [premioCod]="award.id"
            [premioAnyo]="anyo">
          </app-anyos>
        </div>
      }
    </div>
  </div>
}
