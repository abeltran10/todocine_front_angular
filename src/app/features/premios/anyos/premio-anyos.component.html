@if (award(); as premio) {
  <app-header [title]="premio.titulo | uppercase"></app-header> 

  <div class="container-md">
    <div class="row row-cols-1 row-cols-md-3 g-4">
      @for (anyo of premio.anyos; track anyo) {
        <div class="col">
          <app-anyos
            [premioCod]="premio.id"
            [premioAnyo]="anyo">
          </app-anyos>
        </div>
      }
    </div>
  </div>
}
