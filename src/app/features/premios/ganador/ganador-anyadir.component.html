<app-navigation-bar
  [user]="usuario"
  (error)="setErrorMessage($event)">
</app-navigation-bar>

<app-notification
  [successMessage]="(successMessage$ | async) ?? ''"
  [errorMessage]="(errorMessage$ | async) ?? ''">
</app-notification>

<app-header [title]="title"></app-header>

<app-ganador-form
    [awards]="awards"
    [categorias]="categorias$ | async"
    (enviar)="onSubmit($event)"
    (error)="setErrorMessage($event)">
</app-ganador-form>
